name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build, for example v0.1.1"
        required: true
        type: string

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin --config src-tauri/tauri.updater.conf.json"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin --config src-tauri/tauri.updater.conf.json"
          - platform: windows-latest
            args: "--config src-tauri/tauri.updater.conf.json"
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure updater signing key
        shell: bash
        env:
          UPDATER_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");

          const key = (process.env.UPDATER_PRIVATE_KEY || "").trim();
          if (!key) {
            throw new Error("Missing TAURI_SIGNING_PRIVATE_KEY secret. Set it to the content of ~/.tauri/cpu-m-updater.key.");
          }
          if (/cpu-m-updater\.key/.test(key) || key.startsWith("/") || /^[A-Za-z]:[\\/]/.test(key)) {
            throw new Error("TAURI_SIGNING_PRIVATE_KEY must contain the key file content, not a local file path.");
          }

          const decoded = Buffer.from(key, "base64").toString("utf8");
          if (!decoded.startsWith("untrusted comment: rsign encrypted secret key")) {
            throw new Error("TAURI_SIGNING_PRIVATE_KEY is not the private updater key. Do not use the .pub file.");
          }

          const keyPath = path.join(process.env.RUNNER_TEMP, "tauri-updater.key");
          fs.writeFileSync(keyPath, key);
          fs.appendFileSync(process.env.GITHUB_ENV, `TAURI_SIGNING_PRIVATE_KEY=${keyPath}\n`);
          NODE

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ inputs.tag }}
          releaseName: "CPU-M ${{ inputs.tag }}"
          releaseBody: "CPU-M desktop release. The updater metadata is attached as latest.json."
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}
